<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canton Settlement Explorer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="title">
      <h1>Canton Settlement Explorer</h1>
      <span class="tag">privacy = the product · same transaction, three views</span>
    </div>
    <button id="run" class="run">▶ Run settlement</button>
  </header>

  <nav id="viewers" class="viewers"><!-- viewer tabs injected --></nav>
  <p id="subtitle" class="subtitle"></p>
  <div id="toast" class="toast hidden"></div>

  <main>
    <div id="list" class="list"></div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
